name: Build Desktop (Mac)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build:desktop:mac
      - uses: actions/upload-artifact@v4
        with:
          name: AdFontesManager-Mac
          path: release/*.dmg

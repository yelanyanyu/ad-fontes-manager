name: Build Desktop (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build:desktop:win
      - uses: actions/upload-artifact@v4
        with:
          name: AdFontesManager-Windows
          path: release/*.exe

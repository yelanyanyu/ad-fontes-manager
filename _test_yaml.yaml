yield:
  user_word: "ephemeral"
  lemma: "ephemeral"
  syllabification: "e·phem·er·al"
  user_context_sentence: "The mayfly's ephemeral adulthood, spanning but a single day, is devoted entirely to reproduction."
  part_of_speech: "adjective"
  contextual_meaning:
    en: "Lasting for a very short time."
    zh: "极短暂的，转瞬即逝的"
  other_common_meanings:
    - "Lasting only one day, as with some flowers, insects, and diseases."
    - "Filling with water only briefly after rain, as with a desert stream."
    - "A thing of transitory existence (noun)."

etymology:
  root_and_affixes:
    prefix: "epi- [on, upon, for]"
    root: "-hemer- [day]"
    suffix: "-al [pertaining to]"
    structure_analysis: "The Greek compound ephemeros joined epi- (upon/for) with hemera (day) to mean literally 'lasting for a day.' English added the adjectival suffix -al, producing the sense 'pertaining to that which lasts only for a day.'"
  historical_origins:
    history_myth: "In ancient Greek thought, mortals were called ephemeroi — creatures of a day — in contrast to the undying gods."
    source_word: "Greek ἐφήμερος (ephēmeros) — 'lasting only a day, short-lived'"
    pie_root: "*Hehmer (day) — source of Greek hēmera (day)"

  visual_imagery_zh: |
  沙地河床上，水退走已经两天了，只有一道细细的湿痕还趴在那里。空气里有股热乎乎的泥腥味，混着腐草和水蝽的壳。手指按上去，沙还是凉的，往下抠两寸才碰到温的。几株矮草从裂开的泥缝里往外冒，叶片上浮着一层灰白的绒毛，像刚从地底刨出来的活物，还没完全醒透。
  这片洼地一年里有三百天是干的，只有暴雨灌进峡谷那几天，水才会漫过鹅卵石，把上游的鱼卵、草籽、泥沙一股脑推过来。水停住那一下午最安静，能听见沙粒往下沉的簌簌声，像整条河床在把水往下咽。然后光开始抽走水分，第一天水位缩一个指节，第二天退到石头露出半张脸，第三天只剩一小滩，蝌蚪挤在里面打转，尾巴蹭着尾巴。
  一个放羊的男孩蹲下来，把一根干树枝插在湿痕的最边缘。明早他再来时，树枝会倒在干沙上。他知道。他把树枝扶正，又推倒，再扶正。太阳把沙晒得发白，光退过树枝的影子，退过那几株还在喘气的草，最后停在远处谷仓的铁皮顶上，烫出一道颤颤的亮边。
  他站起来走了。树枝还在原地，影子斜斜地指着明天。

  meaning_evolution_zh: |
  这就是 ephemeral 的根画面：在一天之内发生的、以天为尺度丈量的存在。希腊人把活不过一天的东西叫作 ephemeros——发烧只烧一天，虫子翅膀张开只扑腾一个傍晚，花早上开、午后就开始蔫。这些都不是修辞，是观察。
  从"活一天"滑到"活很短"，这个延伸几乎不需要任何抽象跳跃。希腊人用 ephemeroi 来称呼凡人，不是在写诗，而是在陈述一个神视角下的简单事实：你们的全部生命，不过是我们眼中的一天。这个词就这样从医学术语（一日热）和博物学描述（蜉蝣、短命花），慢慢走进日常语言，指一切扛不住时间的物和事。今天的 ephemeral 不再严格限定二十四小时，但那种"撑不过一个完整周期"的意味还在——一阵风、一道光、一个念头、一段关系，都是在某个更大尺度里刚刚开始就结束了的那个单元。

cognate_family:
  cognates:
    - word: "ephemera"
      logic: "直接来自 ephemeros 的中性复数，原指只活一天的虫子。后来指那些本就没打算被保存的东西——传单、票根、手写便条。拿到手的那一刻就已经开始往垃圾桶走。"
    - word: "ephemeris"
      logic: "这个词的意思是天体位置表。每天都要翻新一页，昨天的数据今天就失效。一本星历表就是一堆按天排列的 ephemeral 瞬间，天体在纸面上走过就不再回头。"
    - word: "ephemeron"
      logic: "蜉蝣。希腊人直接管它叫 ephemeron，短命虫。幼虫在水底活一两年，羽化后不吃不喝，交配、产卵、落入水面，翅膀贴在湿沙上，太阳出来前就已经结束了。"
instruction: "这几个同源词都围着一个根动作打转：把某段时间划出来，让它自成一体。"

application:
  selected_examples:
    - type: "Literal / Root Image"
      sentence: "The doctor diagnosed an ephemeral fever that would break by morning."
      translation_zh: "医生诊断那只是一日热，天亮前便会退去。"
    - type: "Current Context"
      sentence: "The mayfly's ephemeral adulthood, spanning but a single day, is devoted entirely to reproduction."
      translation_zh: "蜉蝣短暂的成虫期仅有一天，全部用于繁衍。"
    - type: "Abstract / Metaphorical"
      sentence: "Fame in the age of social media is often ephemeral, burning bright for a week before vanishing."
      translation_zh: "社交媒体时代的声名往往转瞬即逝，燃烧一周便再无踪迹。"

nuance:
  synonyms:
    - word: "transient"
      meaning_zh: "短暂的，过往的——强调停留而非永驻的性质，如旅馆里的过客。"
    - word: "transitory"
      meaning_zh: "暂时的，注定会过去的——强调事物本质上必然会变化或终结。"
    - word: "momentary"
      meaning_zh: "刹那的——极短的一瞬，像是持续状态的短暂中断。"
    - word: "evanescent"
      meaning_zh: "迅速消散的——强调消失之快，带着一层易碎、轻盈的质地。"
    - word: "fleeting"
      meaning_zh: "飞逝的——快到你几乎抓不住它，一闪而过。"
    - word: "fugitive"
      meaning_zh: "逃逸般的——像逃亡者一样迅速离开视线，刚觉察到就已经不见了。"

  image_differentiation_zh: |
    这几个词都在说"短"，但短法不一样。ephemeral 的根画面里有一张日历——一天就是尺度，蜉蝣翅膀撑不过天黑，沙漠河床的水三天就没了。它不只是在说时间短，而是暗示着某种被框定在特定单位里的完整周期：来、活、走，刚好一天。所以 ephemeral 适合那些自成一体的短暂存在——它们不是一个断片，而是一个完整的、只是碰巧很短的故事。

    transient 和 transitory 都带着拉丁语 transire 的脚步——走过去。transient 更中性，只是说某人不打算长住；transitory 则多了一层"本就会过去"的理所当然。两者都没有 ephemeral 那种"一天之内"的精确感。momentary 更短，短到只是一个时间点上的触碰，像闪电，不像一个微型周期。evanescent 轻得像蒸汽，它关注的不是时间长度而是消散的方式——你看它还在，再看已经没了。fleeting 是运动中的东西：你伸出手，它已经滑过去了。fugitive 则像在逃，动作焦点在离开的速度上，越快越抓不到。

    如果把这些词铺在一条时间线上：momentary 是一个点，fleeting 和 fugitive 是一道划过视线的弧线，transient 和 transitory 是一段知道自己不长的路程，evanescent 是看着什么东西从实变虚的过程，而 ephemeral 是一整天——从日出到日落，完完整整，只是刚好在一天内走完。

# Ad Fontes Manager 配置规范 v3.0
# 仅需配置核心参数，其余使用安全默认值

---
# =============================================================================
# 1. 核心 (Core)
# =============================================================================

core:
  env:
    description: 运行环境
    type: string
    enum: [development, production, test]
    default: development
    required: true

  admin_token:
    description: 管理员 API 访问令牌
    type: string
    required: true
    notes: |
      ⚠️ 生产环境必填，32位以上随机字符串
      示例生成: openssl rand -hex 32

---
# =============================================================================
# 2. 服务端 (Server)
# =============================================================================

server:
  port:
    description: API 服务器端口
    type: integer
    range: [1024, 65535]
    default: 3000
    required: false

  host:
    description: 绑定地址
    type: string
    default: "0.0.0.0"
    required: false
    notes: 0.0.0.0 监听所有接口，127.0.0.1 仅本地

  cors_origins:
    description: 允许的跨域来源
    type: array
    default: ["*"]
    required: false
    notes: |
      ⚠️ 生产环境必须限制，示例: ["https://yourdomain.com"]

  rate_limit:
    description: 每分钟请求限制（0=禁用）
    type: integer
    range: [0, 10000]
    default: 0
    required: false
    notes: 生产环境建议 100-300，防止暴力攻击

  timeout_ms:
    description: 请求超时（毫秒）
    type: integer
    range: [5000, 60000]
    default: 10000
    required: false

---
# =============================================================================
# 3. 数据库 (Database)
# =============================================================================

database:
  url:
    description: PostgreSQL 连接字符串
    type: string
    format: "postgresql://user:pass@host:port/db"
    example: "postgresql://postgres:password@localhost:5432/ad_fontes"
    required: true
    notes: |
      ⚠️ 必须通过环境变量设置，禁止硬编码
      生产环境使用 SSL: postgresql://...?sslmode=require

  ssl:
    description: 强制 SSL 连接
    type: boolean
    default: false
    required: false
    notes: ⚠️ 生产环境必须启用

  pool_size:
    description: 连接池大小（可选，自动计算）
    type: integer
    range: [5, 100]
    default: null
    required: false
    notes: |
      未设置时自动计算: dev=10, prod=20
      专家级用户可通过此参数覆盖

---
# =============================================================================
# 4. 存储 (Storage)
# =============================================================================

storage:
  max_items:
    description: 浏览器 LocalStorage 最大条目数
    type: integer
    range: [10, 500]
    default: 100
    required: false
    notes: 防止本地存储无限增长导致浏览器卡顿

---
# =============================================================================
# 5. 日志 (Logging)
# =============================================================================

logging:
  level:
    description: 日志级别
    type: string
    enum: [debug, info, warn, error]
    default: info
    required: false
    notes: 生产环境建议 warn，减少日志量

  enable_file:
    description: 是否同时输出到文件
    type: boolean
    default: false
    required: false
    notes: 生产环境建议启用，便于审计

  audit:
    description: 是否记录安全审计日志
    type: boolean
    default: true
    required: false
    notes: 记录配置变更、认证失败等安全事件

---
# =============================================================================
# 硬编码默认值（用户无需配置）
# =============================================================================

# 以下值在代码中硬编码，使用安全最优值：
#
# pagination:
#   default_size: 20          # 分页大小
#   default_sort: "newest"    # 默认排序
#
# api:
#   cache_duration: 900       # 缓存15分钟
#
# security:
#   helmet: true              # 启用安全头
#   hsts: true                # HTTPS严格传输
#
# template:
#   max_loops: 10000          # 防死循环

---
# =============================================================================
# 环境配置示例
# =============================================================================

# 开发环境 (.env.development)
# --------------------------
# NODE_ENV=development
# ADMIN_TOKEN=dev-token-not-for-production
# DATABASE_URL=postgresql://postgres:password@localhost:5432/ad_fontes_dev
# SERVER_PORT=3000

# 生产环境 (.env.production)
# --------------------------
# NODE_ENV=production
# ADMIN_TOKEN=<openssl rand -hex 32>
# DATABASE_URL=postgresql://<user>:<pass>@<host>:5432/<db>?sslmode=require
# SERVER_CORS_ORIGINS=["https://yourdomain.com"]
# SERVER_RATE_LIMIT=100
# DATABASE_SSL=true
# LOG_LEVEL=warn
# LOG_ENABLE_FILE=true

---
# 配置加载优先级: 环境变量 > .env 文件 > 本文档默认值
# 敏感信息必须通过环境变量注入，禁止写入配置文件

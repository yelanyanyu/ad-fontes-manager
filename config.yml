# =============================================================================
# Ad Fontes Manager - 统一配置文件
# =============================================================================
# 版本: 1.0.0
# 格式: YAML
# 说明: 本项目所有配置的集中管理文件
# =============================================================================

---
# =============================================================================
# 1. 核心配置 (Core)
# =============================================================================

core:
  # 运行环境
  # 可选值: development | production | test
  # 默认值: development
  env: development

  # 管理员 API 访问令牌
  # 生产环境必须设置，32位以上随机字符串
  # 生成命令: openssl rand -hex 32
  admin_token: dev-token-not-for-production

# =============================================================================
# 2. 服务器配置 (Server)
# =============================================================================

server:
  # API 服务器端口
  # 范围: 1024-65535
  # 默认值: 8080
  port: 8080

  # 服务器绑定地址
  # - 0.0.0.0: 监听所有网络接口（Docker/生产环境）
  # - 127.0.0.1: 仅本地访问（开发环境）
  # 默认值: 127.0.0.1
  host: 127.0.0.1

  # 允许的跨域来源
  # 格式: 字符串数组
  # 默认值: ["*"]
  # 生产环境必须限制为实际域名，例如: ["https://yourdomain.com"]
  cors_origins:
    - "*"

  # 速率限制：每分钟最大请求数（0 表示禁用）
  # 范围: 0-10000
  # 默认值: 0
  # 生产环境建议: 100-300
  rate_limit: 0

  # 请求超时（毫秒）
  # 范围: 5000-60000
  # 默认值: 10000
  timeout_ms: 10000

# =============================================================================
# 3. 数据库配置 (Database)
# =============================================================================

database:
  # PostgreSQL 连接字符串
  # 格式: postgresql://USER:PASSWORD@HOST:PORT/DATABASE
  # 示例: postgresql://postgres:password@localhost:5432/ad_fontes
  # 生产环境建议启用 SSL: postgresql://...?sslmode=require
  url: postgresql://postgres:zouqingshan2017@localhost:5432/ad_fontes-test

  # 强制 SSL 连接
  # 生产环境必须设为 true
  # 默认值: false
  ssl: false

  # 连接池大小
  # 范围: 5-100
  # 默认值: null (自动计算: dev=10, prod=20)
  pool_size: null

# =============================================================================
# 4. 前端开发服务器配置 (Client)
# =============================================================================

client:
  # 前端开发服务器端口
  # 范围: 1024-65535
  # 默认值: 5173
  dev_port: 5173

# =============================================================================
# 5. 存储配置 (Storage)
# =============================================================================

storage:
  # 浏览器 LocalStorage 最大条目数
  # 范围: 10-500
  # 默认值: 100
  max_items: 100

# =============================================================================
# 6. 日志配置 (Logging)
# =============================================================================

logging:
  # 日志级别
  # 可选值: debug | info | warn | error
  # 默认值: info
  level: info

  # 日志目录
  # 默认值: ./logs
  dir: ./logs

  # 日志轮转配置
  rotation:
    # 轮转间隔
    # 默认值: 1d (每天)
    interval: 1d

    # 单个日志文件最大大小
    # 默认值: 10M
    max_size: 10M

    # 保留天数
    # 默认值: 30
    max_files: 30

  # 是否启用安全审计日志
  # 默认值: true
  audit: true

# =============================================================================
# 7. 功能开关 (Features)
# =============================================================================

features:
  # 启用本地草稿功能
  # 默认值: true
  local_draft: true

  # 启用数据同步功能
  # 默认值: true
  sync: true

  # 启用冲突检测
  # 默认值: true
  conflict_detection: true

# =============================================================================
# 8. 安全配置 (Security)
# =============================================================================

security:
  # 启用 Helmet 安全头
  # 默认值: true
  helmet: true

  # 启用 HSTS (HTTPS 严格传输)
  # 默认值: true (仅生产环境生效)
  hsts: true

  # 密码最小长度
  # 默认值: 8
  min_password_length: 8

# =============================================================================
# 环境特定配置示例
# =============================================================================
#
# --- 开发环境 ---
# core:
#   env: development
#   admin_token: dev-token-not-for-production
# database:
#   url: postgresql://postgres:password@localhost:5432/ad_fontes_dev
# logging:
#   level: debug
#
# --- 生产环境 ---
# core:
#   env: production
#   admin_token: <openssl rand -hex 32>
# database:
#   url: postgresql://<user>:<pass>@<host>:5432/<db>?sslmode=require
#   ssl: true
# server:
#   cors_origins:
#     - "https://yourdomain.com"
#   rate_limit: 100
# logging:
#   level: warn
#
# --- 测试环境 ---
# core:
#   env: test
# database:
#   url: postgresql://postgres:password@localhost:5432/ad_fontes_test
# logging:
#   level: error
#
# =============================================================================
# 配置加载优先级 (从高到低):
# 1. 环境变量 (如: AD_FONTES_DATABASE_URL)
# 2. 本配置文件 (config.yml)
# 3. 代码中的安全默认值
#
# 敏感信息建议通过环境变量注入，不要写入配置文件
# =============================================================================

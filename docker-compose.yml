version: '3.8'

services:
  app:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ad-fontes-manager
    restart: unless-stopped
    env_file:
      - .env.production  # 仅服务器本地存在，不提交 Git
    environment:
      - NODE_ENV=production
    ports:
      - "${PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/core/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - ad-fontes-network

networks:
  ad-fontes-network:
    driver: bridge

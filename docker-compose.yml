services:
  app:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Frontend is built at image build time; pass token into Vite bundle.
        # Set VITE_ADMIN_TOKEN to the same value as ADMIN_TOKEN.
        VITE_ADMIN_TOKEN: ${VITE_ADMIN_TOKEN}
    container_name: ad-fontes-manager
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    ports:
      - "${PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://${HEALTHCHECK_HOST:-127.0.0.1}:${HEALTHCHECK_PORT:-8080}/api/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ad-fontes-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

networks:
  ad-fontes-network:
    driver: bridge

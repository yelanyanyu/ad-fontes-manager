<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etymos - Generate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Raleway:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{fontFamily:{heading:['Lora','Georgia','serif'],sans:['Raleway','system-ui','sans-serif']}}}};</script>
<style>
  /* Phase transition */
  #phase-input { transition: opacity 0.4s, transform 0.4s; }
  #phase-input.hiding { opacity: 0; transform: translateY(-16px); pointer-events: none; }
  #phase-running { transition: opacity 0.5s, transform 0.5s; }
  #phase-running.showing { opacity: 1; transform: translateY(0); }
  #phase-running.hidden { display: none; opacity: 0; transform: translateY(16px); }

  /* Card state transitions */
  .word-card { transition: all 0.5s ease; }
  .entering { animation: cardIn 0.4s ease both; }
  @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.2); } 50% { box-shadow: 0 0 0 8px rgba(16,185,129,0); } }

  /* Right panel */
  #right-panel { transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s; }
  #right-panel.collapsed { width: 40px !important; }
  #right-panel.collapsed .panel-content { display: none; }
  #right-panel.collapsed .panel-collapsed { display: flex; }

  /* Progress bar animation */
  #progress-fill { transition: width 0.8s ease; }

  /* Table/card toggle */
  .view-toggle-btn { transition: all 0.2s; }
  .view-toggle-btn.active { background: #ecfdf5; color: #065f46; }

  /* Status pulse */
  .status-pulse { animation: pulseGlow 2s infinite; }

  /* Collapse icon rotation */
  #collapse-icon { transition: transform 0.3s; }
  .flip { transform: rotate(180deg); }
</style>
</head>
<body class="bg-stone-50 min-h-screen font-sans antialiased">

<!-- Header -->
<header class="bg-white border-b border-emerald-100 h-16 flex items-center justify-between px-6 flex-none">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 rounded-xl bg-emerald-700 flex items-center justify-center text-white font-bold text-sm">E</div>
    <h1 class="font-bold text-slate-800 tracking-tight text-lg">Etymos</h1>
  </div>
  <div id="header-status">
    <span class="px-3 py-1.5 rounded-xl text-sm font-medium bg-stone-50 text-slate-600 border border-emerald-100">
      English
    </span>
  </div>
</header>

<div class="flex h-[calc(100vh-64px)]">
  <!-- Sidebar -->
  <aside class="w-56 bg-emerald-950 text-emerald-200 flex flex-col flex-none">
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm hover:bg-emerald-800/40 transition-colors">Words</a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm bg-emerald-700 text-white transition-colors">Generate</a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm hover:bg-emerald-800/40 transition-colors opacity-50">Phrases</a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm hover:bg-emerald-800/40 transition-colors">Settings</a>
    </nav>
  </aside>

  <!-- ===== PHASE 1: INPUT ===== -->
  <div id="phase-input" class="flex-1 overflow-y-auto">
    <div class="max-w-4xl mx-auto py-8 px-6 space-y-6">

      <!-- Step 1 -->
      <div class="bg-white rounded-2xl border border-emerald-100 shadow-sm p-6">
        <div class="flex items-center justify-between mb-5">
          <h2 class="text-base font-semibold text-slate-800">步骤 1: 输入单词</h2>
          <div class="flex items-center gap-3">
            <label class="text-sm text-stone-500">目标语言</label>
            <select class="px-3 py-1.5 rounded-xl text-sm font-medium bg-stone-50 text-slate-700 border border-emerald-100 cursor-pointer focus:outline-none focus:ring-2 focus:ring-emerald-300">
              <option>English (en)</option>
              <option>Deutsch (de)</option>
            </select>
          </div>
        </div>
        <textarea id="word-input"
          class="w-full h-40 px-4 py-3 text-sm font-mono text-slate-700 bg-stone-50 border border-emerald-100 rounded-xl resize-y focus:outline-none focus:ring-2 focus:ring-emerald-300 placeholder-stone-400"
          placeholder="每行一个单词，用 | 分隔上下文（可选）&#10;&#10;apple | I ate a juicy apple while reading under the tree.&#10;serendipity&#10;ephemeral | The beauty of cherry blossoms is ephemeral."
        >apple | I ate a juicy apple while reading under the tree.
serendipity
ephemeral | The beauty of cherry blossoms is ephemeral.</textarea>
        <div class="flex items-center justify-between mt-3">
          <div class="flex items-center gap-2 text-xs text-stone-400">
            <span>格式: <code class="bg-emerald-50 px-1 py-0.5 rounded">word | context</code></span>
            <span>·</span>
            <span>context 为可选</span>
          </div>
          <button onclick="parseWords()" class="px-4 py-1.5 text-sm font-medium text-white bg-emerald-700 rounded-xl hover:bg-emerald-600 transition-colors flex items-center gap-1.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
            一键解析
          </button>
        </div>
        <div id="parsed-table" class="mt-4 border border-emerald-100 rounded-xl overflow-hidden hidden"></div>
      </div>

      <!-- Step 2 -->
      <div class="bg-white rounded-2xl border border-emerald-100 shadow-sm p-6">
        <h2 class="text-base font-semibold text-slate-800 mb-4">步骤 2: 生成选项</h2>
        <div class="grid grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">生成模式</label>
            <div class="space-y-2">
              <label class="flex items-center gap-3 px-3 py-2.5 rounded-xl border border-emerald-100 cursor-pointer hover:bg-emerald-50 transition-colors" onclick="document.getElementById('auto-params').classList.add('opacity-40','pointer-events-none')">
                <input type="radio" name="reviewMode" value="manual" checked class="text-slate-700 focus:ring-emerald-400">
                <div>
                  <div class="text-sm font-medium text-slate-800">单次生成模式</div>
                  <div class="text-xs text-stone-400">Pipeline 只运行一次，用户手动查看评分并决定是否修改。</div>
                </div>
              </label>
              <label class="flex items-center gap-3 px-3 py-2.5 rounded-xl border border-emerald-100 cursor-pointer hover:bg-emerald-50 transition-colors" onclick="document.getElementById('auto-params').classList.remove('opacity-40','pointer-events-none')">
                <input type="radio" name="reviewMode" value="auto" class="text-slate-700 focus:ring-emerald-400">
                <div>
                  <div class="text-sm font-medium text-slate-800">自动优化模式</div>
                  <div class="text-xs text-stone-400">评分低于阈值时自动重生成直到达标或达到最大重试次数。</div>
                </div>
              </label>
            </div>
          </div>
          <div id="auto-params" class="opacity-40 pointer-events-none">
            <label class="block text-sm font-medium text-slate-700 mb-2">自动优化参数</label>
            <div class="space-y-3">
              <div class="flex items-center gap-3">
                <label class="text-sm text-stone-500 w-20">通过阈值</label>
                <input type="number" value="6" min="1" max="10" class="w-16 px-2 py-1 text-sm text-center rounded border border-emerald-100 bg-stone-50">
                <span class="text-xs text-stone-400">/ 10 分</span>
              </div>
              <div class="flex items-center gap-3">
                <label class="text-sm text-stone-500 w-20">最大重试</label>
                <input type="number" value="3" min="1" max="10" class="w-16 px-2 py-1 text-sm text-center rounded border border-emerald-100 bg-stone-50">
                <span class="text-xs text-stone-400">次</span>
              </div>
            </div>
          </div>
        </div>
        <div class="mt-5 pt-4 border-t border-emerald-50 flex items-center gap-3">
          <label class="text-sm font-medium text-slate-700">并发数</label>
          <select class="px-3 py-1.5 rounded-xl text-sm bg-stone-50 text-slate-700 border border-emerald-100">
            <option>1</option><option selected>3</option><option>5</option><option>10</option>
          </select>
          <span class="text-xs text-stone-400">同时处理的单词数，过高可能触发 API 限流</span>
        </div>
      </div>

      <div class="flex items-center justify-end gap-3">
        <button class="px-5 py-2.5 text-sm font-medium text-slate-600 bg-white border border-emerald-100 rounded-xl hover:bg-emerald-50 transition-colors">重置</button>
        <button id="btn-start" onclick="startGeneration()" class="px-6 py-2.5 text-sm font-medium text-white bg-emerald-700 rounded-xl hover:bg-emerald-600 transition-colors flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
          开始生成
        </button>
      </div>
    </div>
  </div>

  <!-- ===== PHASE 2: RUNNING ===== -->
  <div id="phase-running" class="hidden flex-1 flex overflow-hidden">
    <!-- Main area -->
    <div class="flex-1 overflow-y-auto min-w-0">
      <div class="max-w-5xl mx-auto py-6 px-6 space-y-4">

        <!-- Progress bar -->
        <div class="bg-white rounded-2xl border border-emerald-100 shadow-sm p-5">
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-base font-semibold text-slate-800">生成进度</h2>
            <span id="progress-text" class="text-sm text-stone-500">0 / 3 已完成</span>
          </div>
          <div class="w-full h-2 bg-emerald-50 rounded-full overflow-hidden">
            <div id="progress-fill" class="h-full bg-emerald-600 rounded-full" style="width:0%"></div>
          </div>
          <div class="flex justify-between mt-2 text-xs text-stone-400">
            <span id="count-done">成功 0</span>
            <span id="count-active">进行中 3</span>
            <span>失败 0</span>
          </div>
        </div>

        <!-- Toolbar: view toggle + batch actions -->
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-1 bg-white rounded-xl border border-emerald-100 p-1">
            <button id="btn-card-view" onclick="switchView('card')" class="view-toggle-btn active px-3 py-1.5 text-xs font-medium rounded-lg">卡片视图</button>
            <button id="btn-table-view" onclick="switchView('table')" class="view-toggle-btn px-3 py-1.5 text-xs font-medium rounded-lg">表格视图</button>
          </div>
          <div class="flex items-center gap-2">
            <button class="px-3 py-1.5 text-xs font-medium text-slate-600 bg-white border border-emerald-100 rounded-xl hover:bg-emerald-50 transition-colors">导出全部 JSON</button>
            <button class="px-3 py-1.5 text-xs font-medium text-white bg-emerald-700 rounded-xl hover:bg-emerald-600 transition-colors">保存全部到词库</button>
          </div>
        </div>

        <!-- Card View -->
        <div id="view-card" class="grid grid-cols-1 gap-3"></div>

        <!-- Table View -->
        <div id="view-table" class="bg-white rounded-2xl border border-emerald-100 shadow-sm overflow-hidden hidden">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-emerald-100 bg-stone-50 text-left">
                <th class="px-5 py-3 text-xs font-semibold text-stone-500 uppercase tracking-wider">单词</th>
                <th class="px-5 py-3 text-xs font-semibold text-stone-500 uppercase tracking-wider">词性</th>
                <th class="px-5 py-3 text-xs font-semibold text-stone-500 uppercase tracking-wider">格式</th>
                <th class="px-5 py-3 text-xs font-semibold text-stone-500 uppercase tracking-wider w-14 text-center">视觉</th>
                <th class="px-5 py-3 text-xs font-semibold text-stone-500 uppercase tracking-wider w-14 text-center">演变</th>
                <th class="px-5 py-3 text-xs font-semibold text-stone-500 uppercase tracking-wider w-14 text-center">辨析</th>
                <th class="px-5 py-3 text-xs font-semibold text-stone-500 uppercase tracking-wider w-14 text-center">总评</th>
                <th class="px-5 py-3 text-xs font-semibold text-stone-500 uppercase tracking-wider text-right">操作</th>
              </tr>
            </thead>
            <tbody id="table-body" class="divide-y divide-emerald-100"></tbody>
          </table>
        </div>

      </div>
    </div>

    <!-- Right Panel -->
    <div id="right-panel" class="collapsed w-[40px] border-l border-emerald-100 bg-white flex flex-col overflow-hidden flex-none" style="min-width:0">
      <!-- Collapsed state -->
      <div id="panel-collapsed" class="flex flex-col items-center py-4 gap-3 cursor-pointer hover:bg-emerald-50/30 transition-colors" onclick="expandPanel()">
        <span class="text-xs text-stone-400 font-medium [writing-mode:vertical-rl] tracking-wider">详情面板</span>
        <svg id="collapse-icon" class="w-4 h-4 text-stone-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18.75 19.5l-7.5-7.5 7.5-7.5m-6 15L5.25 12l7.5-7.5"/></svg>
      </div>
      <!-- Expanded state -->
      <div id="panel-content" class="hidden flex-1 flex flex-col overflow-hidden">
        <div class="flex items-center justify-between px-4 py-3 border-b border-emerald-50 bg-emerald-50/30 flex-none">
          <div class="flex items-center gap-2">
            <button onclick="collapsePanel()" class="p-1 rounded hover:bg-emerald-100 transition-colors text-stone-400 hover:text-stone-600" title="收起">
              <svg class="w-4 h-4 flip" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18.75 19.5l-7.5-7.5 7.5-7.5m-6 15L5.25 12l7.5-7.5"/></svg>
            </button>
            <h3 id="panel-word" class="text-sm font-semibold text-slate-800">--</h3>
            <span id="panel-meta" class="text-xs text-stone-400"></span>
          </div>
          <button onclick="closePanel()" class="p-1 rounded hover:bg-emerald-100 transition-colors text-stone-400 hover:text-stone-600" title="关闭">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>

        <!-- YAML editor -->
        <div class="flex flex-col border-b border-emerald-50 flex-none" style="height:50%">
          <div class="px-4 py-2 flex items-center justify-between bg-white border-b border-emerald-50/50">
            <span class="text-xs font-medium text-stone-500">YAML 原文（可手动编辑）</span>
            <span class="text-xs text-emerald-500">格式正确</span>
          </div>
          <textarea id="panel-yaml" class="flex-1 p-4 text-xs font-mono text-slate-700 resize-none focus:outline-none bg-white leading-relaxed"></textarea>
        </div>

        <!-- Field reviews -->
        <div class="flex-1 overflow-y-auto p-4 space-y-3">
          <span class="text-xs font-medium text-stone-500">逐字段评分</span>
          <div id="panel-fields"></div>
          <div class="pt-2 flex items-center gap-2">
            <button class="flex-1 px-3 py-2 text-xs font-medium text-slate-600 bg-white border border-emerald-100 rounded hover:bg-emerald-50 transition-colors">保存此单词</button>
            <button class="flex-1 px-3 py-2 text-xs font-medium text-white bg-emerald-700 rounded hover:bg-emerald-600 transition-colors">忽略，直接保存</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== STATE =====
const state = {
  phase: 'input',
  viewMode: 'card',
  selectedWordId: null,
  words: [],
};

// Word data (would come from backend)
const wordsData = [
  { id: 'w1', word: 'apple', pos: 'noun', context: 'I ate a juicy apple while reading under the tree.' },
  { id: 'w2', word: 'serendipity', pos: 'noun', context: '' },
  { id: 'w3', word: 'ephemeral', pos: 'adjective', context: 'The beauty of cherry blossoms is ephemeral.' },
];

// Simulated YAML content
function yamlForWord(word) {
  return `yield:
  user_word: "${word}"
  lemma: "${word}"
  syllabification: "${word.replace(/(.)/,'$1-')}"
  part_of_speech: "${wordsData.find(w=>w.word===word)?.pos||'noun'}"
  contextual_meaning:
    en: "..."
    zh: "..."

etymology:
  root_and_affixes:
    prefix: ""
    root: "${word}"
    suffix: ""
  historical_origins:
    source_word: "OE ..."
    pie_root: "*..."
  visual_imagery_zh: |
    画面感描述...
  meaning_evolution_zh: |
    从指称具体事物，到泛指...
  image_differentiation_zh: |
    同义词辨析...`;
}

// Field scores (pre-defined for simulation)
const scoresMap = {
  apple: { visual: 8, meaning: 9, diff: 8, format: 'pass', fixCount: 0 },
  serendipity: { visual: 5, meaning: 7, diff: 7, format: 'fixed', fixCount: 1 },
  ephemeral: { visual: 9, meaning: 9, diff: 8, format: 'pass', fixCount: 0 },
};

function avgScore(s) { return ((s.visual + s.meaning + s.diff) / 3).toFixed(1); }
function scoreColor(s) { return s >= 8 ? 'text-emerald-700 bg-emerald-50' : s >= 6 ? 'text-amber-700 bg-amber-50' : 'text-red-700 bg-red-50'; }
function scoreBadge(v) { return `<span class="inline-flex items-center justify-center w-7 h-7 rounded-full text-xs font-bold ${scoreColor(v)}">${v}</span>`; }

// ===== PARSE WORDS =====
function parseWords() {
  const input = document.getElementById('word-input').value.trim();
  if (!input) return;
  const lines = input.split('\n').filter(l => l.trim());
  state.words = lines.map((line, i) => {
    const parts = line.split('|');
    return {
      id: `w${i+1}`,
      word: parts[0].trim(),
      context: parts[1] ? parts[1].trim() : '',
      status: 'ready', // ready | queued | generating | done
      stage: '',
      pos: '',
      scores: null,
    };
  });

  const tbody = state.words.map((w, i) => `
    <tr class="hover:bg-emerald-50/30">
      <td class="px-4 py-2 text-xs text-stone-400">${i+1}</td>
      <td class="px-4 py-2 font-medium text-slate-800">${w.word}</td>
      <td class="px-4 py-2 text-xs text-stone-500">${w.context || '<span class="italic text-stone-400">-- 无上下文 --</span>'}</td>
      <td class="px-4 py-2">
        <span class="inline-flex items-center gap-1 text-xs text-emerald-600">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span> 就绪
        </span>
      </td>
    </tr>
  `).join('');

  const table = document.getElementById('parsed-table');
  table.innerHTML = `
    <div class="bg-stone-50 px-4 py-2 border-b border-emerald-100 flex items-center justify-between">
      <span class="text-xs font-medium text-slate-600">已解析 <strong>${state.words.length}</strong> 个单词</span>
      <span class="text-xs text-stone-400">就绪 ${state.words.length}</span>
    </div>
    <div class="max-h-48 overflow-y-auto">
      <table class="w-full text-sm">
        <thead class="bg-stone-50/50 sticky top-0">
          <tr class="text-left text-xs text-stone-500">
            <th class="px-4 py-2 font-medium w-8">#</th>
            <th class="px-4 py-2 font-medium">单词</th>
            <th class="px-4 py-2 font-medium">上下文</th>
            <th class="px-4 py-2 font-medium w-24">状态</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-emerald-100">${tbody}</tbody>
      </table>
    </div>
  `;
  table.classList.remove('hidden');
}

// ===== START GENERATION =====
function startGeneration() {
  if (state.words.length === 0) parseWords();
  if (state.words.length === 0) return;

  // Set up words for running phase
  state.words = state.words.map((w, i) => ({ ...w, status: 'queued' }));
  state.words[0].status = 'generating';
  state.words[0].stage = 'Pass 1: 搜索词源...';
  state.phase = 'running';

  // Transition
  const inputEl = document.getElementById('phase-input');
  const runningEl = document.getElementById('phase-running');

  inputEl.classList.add('hiding');
  setTimeout(() => {
    inputEl.style.display = 'none';

    // Show running — set initial invisible state, then animate in
    runningEl.classList.remove('hidden');
    runningEl.style.opacity = '0';
    runningEl.style.transform = 'translateY(16px)';

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        runningEl.style.opacity = '1';
        runningEl.style.transform = 'translateY(0)';
      });
    });
  }, 400);

  // Update header
  document.getElementById('header-status').innerHTML = `
    <span class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-sm font-medium bg-amber-50 text-amber-700 border border-amber-200">
      <span class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span>
      生成中 · <span id="header-count">0/${state.words.length}</span>
    </span>
  `;

  renderCards();
  renderTable();

  // Simulate progress
  simulateProgress();
}

// ===== SIMULATE PROGRESS =====
function simulateProgress() {
  const queue = [...state.words];
  let idx = 0;

  function next() {
    if (idx >= queue.length) {
      document.getElementById('header-status').innerHTML = `
        <span class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-sm font-medium bg-emerald-50 text-emerald-700 border border-emerald-200">
          <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
          全部完成 · ${state.words.length}/${state.words.length}
        </span>`;
      updateProgress();
      return;
    }

    const w = queue[idx];
    w.status = 'generating';
    updateCard(w);
    updateTableRow(w);
    updateProgress();

    const stages = [
      'Pass 1: 搜索词源...',
      'Pass 1: 生成结构字段...',
      '格式检查...',
      'Pass 2: 生成创意字段...',
      '审查评分...',
    ];
    let si = 0;
    const stageInterval = setInterval(() => {
      if (si < stages.length) {
        w.stage = stages[si];
        si++;
        // Only update stage text, not full rebuild
        const stageEl = document.getElementById('stage-' + w.id);
        if (stageEl) stageEl.textContent = w.stage;
      } else {
        clearInterval(stageInterval);
        w.status = 'done';
        w.stage = '';
        w.pos = wordsData.find(d => d.word === w.word)?.pos || 'noun';
        w.scores = scoresMap[w.word] || { visual: 7, meaning: 7, diff: 7, format: 'pass', fixCount: 0 };
        idx++;
        updateCard(w);
        updateTableRow(w);
        updateProgress();

        if (idx < queue.length) {
          queue[idx].status = 'generating';
          queue[idx].stage = 'Pass 1: 搜索词源...';
          updateCard(queue[idx]);
          updateTableRow(queue[idx]);
          updateProgress();
          setTimeout(next, 800);
        } else {
          next();
        }
      }
    }, 700);
  }

  next();
}

// ===== TARGETED DOM UPDATES (no full re-render) =====
function updateCard(w) {
  const card = document.getElementById('card-' + w.id);
  if (!card) return;
  card.outerHTML = buildCardHTML(w);
  // Re-attach enter animation
  const newCard = document.getElementById('card-' + w.id);
  if (newCard && w.status === 'done') {
    newCard.classList.add('entering');
  }
}

function updateTableRow(w) {
  const row = document.getElementById('row-' + w.id);
  if (!row) return;
  row.outerHTML = buildTableRowHTML(w);
}

function updateProgress() {
  const done = state.words.filter(w => w.status === 'done').length;
  const active = state.words.filter(w => w.status === 'generating').length;
  const total = state.words.length;
  const pct = Math.round((done / total) * 100);

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done} / ${total} 已完成`;
  document.getElementById('count-done').textContent = `成功 ${done}`;
  document.getElementById('count-active').textContent = `进行中 ${active}`;
  const hc = document.getElementById('header-count');
  if (hc) hc.textContent = `${done}/${total}`;
}

// ===== BUILD CARD HTML =====
function buildCardHTML(w) {
  const isDone = w.status === 'done';
  const isGenerating = w.status === 'generating';
  const isSelected = w.id === state.selectedWordId;

  if (isDone) {
    const s = w.scores;
    const stageTags = ['搜索','Pass 1','格式修正','Pass 2','审查完成'];
    return `<div id="card-${w.id}" class="word-card bg-white rounded-2xl border ${isSelected?'border-blue-300 ring-2 ring-blue-100':'border-emerald-200'} shadow-sm p-5 cursor-pointer hover:border-emerald-300 hover:shadow transition-all" onclick="selectWord('${w.id}')">
      <div class="flex items-start justify-between">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-xl bg-emerald-100 flex items-center justify-center">
            <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
          </div>
          <div>
            <h3 class="text-sm font-semibold text-slate-800">${w.word} ${isSelected?'<span class="text-xs text-blue-500 font-normal ml-1">已选中</span>':''}</h3>
            <p class="text-xs text-stone-400">${w.pos}${s.format==='fixed'?` · 修正${s.fixCount}次`:''}</p>
          </div>
        </div>
        <span class="text-xs px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-600 font-medium">评分 ${avgScore(s)}</span>
      </div>
      <div class="mt-3 flex items-center gap-1.5">
        ${stageTags.map(t => `<span class="text-xs px-2 py-0.5 rounded bg-emerald-50 text-emerald-600">${t}</span>`).join('<svg class="w-3 h-3 text-emerald-200" fill="currentColor" viewBox="0 0 24 24"><path d="M8.59 16.58L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>')}
      </div>
    </div>`;
  } else if (isGenerating) {
    return `<div id="card-${w.id}" class="word-card bg-white rounded-2xl border border-blue-200 shadow-sm p-5 ring-1 ring-blue-100 transition-all status-pulse">
      <div class="flex items-start justify-between">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-xl bg-blue-100 flex items-center justify-center">
            <svg class="w-5 h-5 text-blue-600 animate-spin" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182M8.25 12.75l3-3 3 3"/></svg>
          </div>
          <div>
            <h3 class="text-sm font-semibold text-slate-800">${w.word}</h3>
            <p id="stage-${w.id}" class="text-xs text-blue-500 font-medium animate-pulse">${w.stage}</p>
          </div>
        </div>
        <span class="text-xs px-2 py-0.5 rounded-full bg-blue-50 text-blue-600 font-medium">生成中</span>
      </div>
    </div>`;
  } else {
    return `<div id="card-${w.id}" class="word-card bg-white rounded-2xl border border-emerald-100 shadow-sm p-5 opacity-50 transition-all">
      <div class="flex items-start justify-between">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-xl bg-emerald-50 flex items-center justify-center">
            <svg class="w-5 h-5 text-stone-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 4.5h14.25M3 9h9.75M3 13.5h9.75m4.5-4.5v12m0 0l-3.75-3.75M17.25 21L21 17.25"/></svg>
          </div>
          <div>
            <h3 class="text-sm font-semibold text-slate-800">${w.word}</h3>
            <p class="text-xs text-stone-400">等待中</p>
          </div>
        </div>
        <span class="text-xs px-2 py-0.5 rounded-full bg-emerald-50 text-stone-500 font-medium">等待中</span>
      </div>
    </div>`;
  }
}

function buildTableRowHTML(w) {
  const isDone = w.status === 'done';
  const isSelected = w.id === state.selectedWordId;
  if (!isDone) {
    return `<tr id="row-${w.id}" class="opacity-50">
      <td class="px-5 py-3.5 font-medium text-slate-800">${w.word}</td>
      <td class="px-5 py-3.5 text-stone-400">-</td>
      <td class="px-5 py-3.5 text-stone-400">${w.status==='generating'?'生成中...':'等待中'}</td>
      <td class="px-5 py-3.5 text-center">-</td><td class="px-5 py-3.5 text-center">-</td><td class="px-5 py-3.5 text-center">-</td>
      <td class="px-5 py-3.5 text-center">-</td><td class="px-5 py-3.5 text-right">-</td>
    </tr>`;
  }
  const s = w.scores;
  return `<tr id="row-${w.id}" class="${isSelected?'bg-blue-50/50 ring-1 ring-inset ring-blue-200':''} hover:bg-emerald-50/30 transition-colors cursor-pointer" onclick="selectWord('${w.id}')">
    <td class="px-5 py-3.5"><div class="flex items-center gap-2.5"><span class="font-medium text-slate-800">${w.word}</span>${isSelected?'<span class="text-xs text-blue-500 font-medium">已选中</span>':''}</div></td>
    <td class="px-5 py-3.5 text-stone-500">${w.pos}</td>
    <td class="px-5 py-3.5"><span class="inline-flex items-center gap-1 text-xs ${s.format==='pass'?'text-emerald-600':'text-amber-600'}">${s.format==='pass'?'<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg> 通过':'<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg> 修正 '+s.fixCount+' 次'}</span></td>
    <td class="px-5 py-3.5 text-center">${scoreBadge(s.visual)}</td>
    <td class="px-5 py-3.5 text-center">${scoreBadge(s.meaning)}</td>
    <td class="px-5 py-3.5 text-center">${scoreBadge(s.diff)}</td>
    <td class="px-5 py-3.5 text-center"><span class="text-sm font-bold ${avgScore(s)>=6?'text-emerald-700':'text-amber-600'}">${avgScore(s)}</span></td>
    <td class="px-5 py-3.5 text-right"><div class="flex items-center justify-end gap-1.5">
      <button class="px-2.5 py-1.5 text-xs text-blue-600 hover:text-blue-700 hover:bg-blue-50 rounded transition-colors font-medium" onclick="event.stopPropagation();selectWord('${w.id}')">详情</button>
      <button class="px-2.5 py-1.5 text-xs text-stone-500 hover:text-emerald-700 hover:bg-emerald-50 rounded transition-colors" onclick="event.stopPropagation()">预览</button>
    </div></td>
  </tr>`;
}

// ===== RENDER CARDS (initial full render) =====
function renderCards() {
  document.getElementById('view-card').innerHTML = state.words.map((w, i) =>
    `<div style="animation-delay:${i*0.05}s" class="entering">${buildCardHTML(w)}</div>`
  ).join('');
}

// ===== RENDER TABLE (initial full render) =====
function renderTable() {
  document.getElementById('table-body').innerHTML = state.words.map(w => buildTableRowHTML(w)).join('');
}

// ===== VIEW SWITCH =====
function switchView(mode) {
  state.viewMode = mode;
  document.getElementById('view-card').classList.toggle('hidden', mode !== 'card');
  document.getElementById('view-table').classList.toggle('hidden', mode !== 'table');
  document.getElementById('btn-card-view').classList.toggle('active', mode === 'card');
  document.getElementById('btn-table-view').classList.toggle('active', mode === 'table');
}

// ===== RIGHT PANEL =====
function selectWord(wordId) {
  const w = state.words.find(w => w.id === wordId);
  if (!w || w.status !== 'done') return;

  const prevId = state.selectedWordId;
  state.selectedWordId = wordId;

  expandPanel();
  showInPanel(w);

  // Update selection highlight for both old and new selections
  [prevId, wordId].forEach(id => {
    if (!id) return;
    const word = state.words.find(w => w.id === id);
    if (word && word.status === 'done') {
      updateCard(word);
      updateTableRow(word);
    }
  });
}

function showInPanel(w) {
  const s = w.scores;
  document.getElementById('panel-word').textContent = w.word;
  document.getElementById('panel-meta').textContent = `· ${w.pos} · 评分 ${avgScore(s)}`;
  document.getElementById('panel-yaml').value = yamlForWord(w.word);

  const fields = [
    { name: 'visual_imagery_zh', score: s.visual, passed: s.visual >= 6,
      comments: s.visual >= 8 ? ['画面感强烈，细节丰富'] : s.visual >= 6 ? ['描述到位，可以更好'] : ['场景过于抽象，缺少触觉和听觉细节', '第三句使用了模板腔'],
      positive: s.visual >= 8 ? ['从触觉落笔，方向正确'] : [] },
    { name: 'meaning_evolution_zh', score: s.meaning, passed: s.meaning >= 6,
      comments: s.meaning >= 6 ? ['演变路径清晰，从具体到抽象的逻辑链完整'] : ['演变过程跳跃，缺少中间环节'],
      positive: [] },
    { name: 'image_differentiation_zh', score: s.diff, passed: s.diff >= 6,
      comments: s.diff >= 6 ? ['同义词辨析到位，动作焦点区分清晰'] : ['辨析不够深入，仅停留在表面'],
      positive: [] },
  ];

  document.getElementById('panel-fields').innerHTML = fields.map(f => `
    <div class="p-3 rounded-xl border ${f.passed?'border-emerald-100 bg-emerald-50/50':'border-amber-100 bg-amber-50/50'}">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-medium text-slate-700">${f.name}</span>
        <div class="flex items-center gap-2">
          <span class="text-xs px-2 py-0.5 rounded-full ${f.passed?'bg-emerald-100 text-emerald-700':'bg-amber-100 text-amber-700'} font-medium">${f.score} / 10</span>
          <span class="text-xs ${f.passed?'text-emerald-600':'text-red-500'} font-medium">${f.passed?'达标':'不达标'}</span>
        </div>
      </div>
      ${f.comments.filter(c=>!f.positive.includes(c)).map(c => `<p class="text-xs ${f.passed?'text-emerald-600':'text-red-600'} flex items-start gap-1.5"><span class="mt-0.5">·</span><span>${c}</span></p>`).join('')}
      ${f.positive.map(c => `<p class="text-xs text-emerald-600 flex items-start gap-1.5"><span class="mt-0.5">·</span><span>${c}</span></p>`).join('')}
      <div class="mt-2 flex items-center gap-2">
        <input type="text" placeholder="修改意见（可选）" class="flex-1 px-2.5 py-1.5 text-xs border border-emerald-100 rounded focus:outline-none focus:ring-1 focus:ring-emerald-300">
        <button class="px-2.5 py-1.5 text-xs font-medium ${f.passed?'text-slate-600 bg-white border border-emerald-100 rounded hover:bg-emerald-50':'text-white bg-emerald-600 rounded hover:bg-emerald-500'} transition-colors flex items-center gap-1 whitespace-nowrap">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/></svg>
          AI 重生成并重新审核
        </button>
      </div>
    </div>
  `).join('');
}

function expandPanel() {
  const panel = document.getElementById('right-panel');
  panel.classList.remove('collapsed');
  panel.style.width = '440px';
  document.getElementById('panel-collapsed').style.display = 'none';
  document.getElementById('panel-content').classList.remove('hidden');
}

function collapsePanel() {
  const panel = document.getElementById('right-panel');
  panel.classList.add('collapsed');
  panel.style.width = '40px';
  document.getElementById('panel-collapsed').style.display = 'flex';
  document.getElementById('panel-content').classList.add('hidden');
}

function closePanel() {
  collapsePanel();
  state.selectedWordId = null;
  refreshUI();
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  // Pre-parse the default input
  parseWords();
});
</script>
</body>
</html>

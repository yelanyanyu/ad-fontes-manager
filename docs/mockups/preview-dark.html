<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Etymos — Final Editorial UI Dark</title>
  <style>
    :root{
      --bg-top:#181612;
      --bg-bottom:#11100e;
      --surface:#24211d;
      --surface-panel:rgba(35,32,28,.96);
      --surface-soft:#211e1a;
      --surface-head:#29251f;
      --editor-field:#211e1a;
      --table-field:#24201b;
      --table-head:#2d2822;

      --text:#eee8de;
      --text-soft:#d7cec2;
      --muted:#aaa197;
      --faint:#7f776f;

      --border:#3f3931;
      --border-strong:#5a5148;
      --line:#37312b;

      --nav:#0b0a09;
      --nav-soft:#171410;

      --green:#43b37f;
      --green-hover:#4fc08b;
      --green-soft:rgba(67,179,127,.12);
      --green-border:rgba(67,179,127,.34);

      --blue:#7ca2ff;
      --blue-soft:rgba(124,162,255,.12);
      --blue-border:rgba(124,162,255,.28);

      --shadow-sm:0 1px 2px rgba(0,0,0,.22);
      --shadow-md:0 12px 34px rgba(0,0,0,.24);

      --sans:Inter,-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;
      --serif:"Iowan Old Style","Palatino Linotype","Book Antiqua",Palatino,Georgia,"Times New Roman",serif;
      --mono:"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    }

    *{box-sizing:border-box}

    html,body{height:100%}

    body{
      margin:0;
      color:var(--text);
      font-family:var(--sans);
      -webkit-font-smoothing:antialiased;
      background:
        radial-gradient(circle at 78% -16%, rgba(94,76,52,.22), transparent 32%),
        radial-gradient(circle at 12% 112%, rgba(67,179,127,.08), transparent 25%),
        linear-gradient(180deg,var(--bg-top) 0%,var(--bg-bottom) 100%);
      overflow:hidden;
    }

    button,input,select,textarea{font:inherit}
    button{cursor:pointer}

    .app{
      height:100vh;
      min-width:1120px;
      display:grid;
      grid-template-columns:58px 1fr;
    }

    .sidebar{
      background:linear-gradient(180deg,#0d0c0b 0%,#090807 100%);
      border-right:1px solid rgba(255,255,255,.055);
      padding:14px 8px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
    }

    .nav-item{
      width:36px;
      height:36px;
      border:0;
      border-radius:9px;
      background:transparent;
      color:#8d857b;
      display:grid;
      place-items:center;
      transition:background .14s ease,color .14s ease;
    }

    .nav-item:hover{background:rgba(255,255,255,.08);color:#f2eadf}
    .nav-item.active{background:rgba(255,255,255,.10);color:#fff}
    .nav-item svg{width:18px;height:18px;stroke-width:1.85}
    .spacer{flex:1}

    .main{
      min-width:0;
      display:grid;
      grid-template-rows:58px 1fr;
    }

    .topbar{
      height:58px;
      background:rgba(24,22,20,.76);
      backdrop-filter:blur(18px);
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px 0 28px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .brand-icon{
      width:22px;
      height:22px;
      color:var(--blue);
      display:grid;
      place-items:center;
      filter:drop-shadow(0 0 10px rgba(124,162,255,.16));
    }

    .brand-name{
      font-family:var(--serif);
      font-size:23px;
      font-weight:700;
      line-height:1;
      letter-spacing:-.04em;
      color:#f2eadf;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .icon-btn{
      width:30px;
      height:30px;
      border-radius:8px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.05);
      color:#c7beb3;
      display:grid;
      place-items:center;
      box-shadow:var(--shadow-sm);
    }

    .icon-btn:hover{
      background:rgba(255,255,255,.06);
      border-color:var(--border-strong);
      color:#fff;
    }

    .lang{
      height:30px;
      min-width:104px;
      padding:0 10px;
      border-radius:8px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.05);
      color:#d8cfc4;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      font-size:13px;
      box-shadow:var(--shadow-sm);
    }

    .workspace{
      min-width:0;
      min-height:0;
      padding:16px 14px 14px;
      overflow:auto;
      background:transparent;
    }

    .grid{
      min-height:calc(100vh - 88px);
      display:grid;
      grid-template-columns:1fr 1.22fr;
      gap:14px;
    }

    .panel{
      min-height:0;
      overflow:hidden;
      background:var(--surface-panel);
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:var(--shadow-md);
    }

    .panel-head{
      height:48px;
      padding:0 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg,#2a261f,#221f1a);
    }

    .panel-title{
      display:flex;
      align-items:baseline;
      gap:12px;
    }

    .panel-title strong{
      font-size:14px;
      font-weight:740;
      letter-spacing:.055em;
      color:#eee8de;
      text-transform:uppercase;
    }

    .panel-title span{
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--muted);
      font-size:13px;
      font-weight:500;
    }

    .panel-title span::before{
      content:"";
      width:6px;
      height:6px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 0 3px rgba(67,179,127,.10);
    }

    .head-link{
      border:0;
      background:transparent;
      color:#8d857b;
      font-size:13px;
      padding:0;
    }

    .head-link:hover{color:#eee8de}

    .editor-panel{
      display:grid;
      grid-template-rows:48px 1fr 56px;
    }

    .editor-area{
      min-height:0;
      background:var(--editor-field);
      display:grid;
      grid-template-columns:46px 1fr;
      border-bottom:1px solid var(--line);
      font-family:var(--mono);
      font-size:13px;
      line-height:1.72;
      color:#d8d0c5;
    }

    .line-number{
      padding-top:20px;
      text-align:center;
      color:#706961;
      border-right:1px solid var(--line);
      user-select:none;
      background:#1b1814;
    }

    .editor-input{
      padding:18px 16px;
    }

    .editor-input textarea{
      width:100%;
      height:100%;
      min-height:520px;
      border:0;
      outline:0;
      resize:none;
      background:transparent;
      color:inherit;
      font:inherit;
      line-height:inherit;
    }

    .editor-input textarea::placeholder{color:#80786f}

    .editor-foot{
      background:#26231e;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      padding:0 12px;
    }

    .btn{
      height:34px;
      border-radius:8px;
      border:1px solid transparent;
      padding:0 14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-size:13px;
      font-weight:560;
      white-space:nowrap;
      transition:background .14s ease,border-color .14s ease,color .14s ease,box-shadow .14s ease;
    }

    .btn svg{width:14px;height:14px}

    .btn-primary{
      background:var(--green);
      color:#08100c;
      box-shadow:0 6px 18px rgba(67,179,127,.18);
    }

    .btn-primary:hover{background:var(--green-hover)}

    .btn-secondary{
      background:rgba(255,255,255,.055);
      border-color:var(--border-strong);
      color:#cfc5b9;
    }

    .btn-secondary:hover{background:rgba(255,255,255,.065)}

    .btn-soft-green{
      background:var(--green-soft);
      border-color:var(--green-border);
      color:#93e6bb;
      font-weight:620;
    }

    .btn-soft-blue{
      background:var(--blue-soft);
      border-color:var(--blue-border);
      color:#adc4ff;
      font-weight:620;
    }

    .btn-quiet{
      background:rgba(255,255,255,.05);
      border-color:var(--border);
      color:#b6aca1;
    }

    .btn-disabled{
      opacity:.48;
      box-shadow:none;
      pointer-events:none;
    }

    .table-panel{
      display:grid;
      grid-template-rows:auto 1fr 48px;
    }

    .toolbar{
      padding:10px 12px 12px;
      background:#26231e;
      border-bottom:1px solid var(--line);
      display:grid;
      gap:10px;
    }

    .toolbar-row{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .toolbar-row.split{
      justify-content:space-between;
      gap:12px;
    }

    .toolbar-left,
    .toolbar-right{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .search-wrap{
      flex:1;
      min-width:280px;
      height:34px;
      border:1px solid var(--border-strong);
      border-radius:8px;
      background:#201d18;
      display:flex;
      align-items:center;
      gap:8px;
      padding:0 10px;
      color:#8f877e;
      box-shadow:0 1px 1px rgba(0,0,0,.18);
    }

    .search-wrap:focus-within{
      border-color:rgba(67,179,127,.52);
      box-shadow:0 0 0 3px rgba(67,179,127,.10);
    }

    .search-wrap input{
      width:100%;
      border:0;
      outline:0;
      background:transparent;
      font-size:13px;
      color:var(--text);
    }

    .search-wrap input::placeholder{color:#80786f}

    .search-actions{
      display:flex;
      align-items:center;
    }

    .search-btn{
      height:34px;
      border:0;
      background:var(--green);
      color:#07110c;
      font-size:13px;
      font-weight:700;
      padding:0 16px;
      box-shadow:0 6px 16px rgba(67,179,127,.16);
    }

    .search-btn:first-child{border-radius:8px 0 0 8px}
    .search-btn:last-child{
      border-left:1px solid rgba(0,0,0,.16);
      border-radius:0 8px 8px 0;
      padding:0 10px;
    }

    .search-btn:hover{background:var(--green-hover)}

    .ctl{
      height:28px;
      border:1px solid var(--border-strong);
      background:rgba(255,255,255,.05);
      border-radius:6px;
      padding:0 10px;
      color:#c3b9ad;
      font-size:12px;
      display:inline-flex;
      align-items:center;
      gap:6px;
      box-shadow:0 1px 1px rgba(0,0,0,.14);
    }

    .ctl strong{font-weight:700;color:#f0e8dd}

    .count{
      height:28px;
      border:1px solid var(--border);
      background:#2b2721;
      color:#d2c8bc;
      border-radius:999px;
      padding:0 10px;
      font-size:12px;
      font-weight:650;
      display:inline-flex;
      align-items:center;
    }

    .refresh{
      width:28px;
      height:28px;
      border:0;
      background:transparent;
      color:#aaa197;
      display:grid;
      place-items:center;
    }

    .refresh:hover{color:#fff}

    .table-wrap{
      min-height:0;
      overflow:auto;
      background:#26231e;
      padding:12px;
    }

    .table-shell{
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:12px;
      background:var(--table-field);
    }

    .thead,
    .trow{
      display:grid;
      grid-template-columns:34px 1fr 122px;
      align-items:center;
      padding:0 14px;
      border-bottom:1px solid var(--line);
    }

    .thead{
      min-height:42px;
      background:var(--table-head);
      color:#aaa197;
      font-size:12px;
      font-weight:740;
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    .thead .right{justify-self:end}

    .trow{
      min-height:51px;
      transition:background .12s ease;
    }

    .trow:last-child{border-bottom:0}
    .trow:hover{background:#2a251f}

    .check{
      width:15px;
      height:15px;
      border-radius:4px;
      border:1px solid #575047;
      background:#201d18;
      color:#06100b;
      font-size:10px;
      line-height:1;
      display:grid;
      place-items:center;
      font-weight:800;
    }

    .check.selected{
      background:var(--green);
      border-color:var(--green);
    }

    .lemma-cell{
      font-family:var(--serif);
      font-size:17px;
      font-weight:650;
      letter-spacing:-.025em;
      color:#eee8de;
    }

    .row-actions{
      display:flex;
      justify-content:flex-end;
      gap:8px;
      opacity:.56;
      transition:opacity .12s ease;
    }

    .trow:hover .row-actions{opacity:1}

    .action-btn{
      width:31px;
      height:31px;
      border-radius:8px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.045);
      color:#bdb3a7;
      display:grid;
      place-items:center;
    }

    .action-btn svg{width:16px;height:16px;stroke-width:1.75}

    .action-btn:hover{
      background:rgba(255,255,255,.065);
      border-color:var(--border-strong);
      color:#fff;
    }

    .footer{
      height:48px;
      padding:0 14px;
      background:#26231e;
      border-top:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      color:#aaa197;
      font-size:12px;
    }

    .pages{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .page{
      min-width:22px;
      height:22px;
      padding:0 6px;
      border:0;
      border-radius:6px;
      background:transparent;
      color:#bdb3a7;
      font-size:12px;
    }

    .page.active{
      background:var(--green);
      color:#07110c;
      font-weight:800;
      box-shadow:0 4px 14px rgba(67,179,127,.18);
    }

    .page.ghost{opacity:.46}

    ::selection{
      background:rgba(67,179,127,.32);
      color:#fff;
    }

    ::-webkit-scrollbar{width:10px;height:10px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{
      background:#39342e;
      border:3px solid transparent;
      background-clip:content-box;
      border-radius:999px;
    }
    ::-webkit-scrollbar-thumb:hover{background:#514a42;background-clip:content-box}

    @media(max-width:1200px){
      body{overflow:auto}
      .app{
        height:auto;
        min-height:100vh;
        min-width:0;
      }
      .grid{grid-template-columns:1fr}
      .workspace{overflow:visible}
      .editor-input textarea{min-height:360px}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Main navigation">
      <button class="nav-item active" title="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg>
      </button>

      <button class="nav-item" title="Words">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6.5 3H20v18H6.5A2.5 2.5 0 0 1 4 18.5v-13A2.5 2.5 0 0 1 6.5 3z"/><path d="M8 7h8"/><path d="M8 11h8"/></svg>
      </button>

      <button class="nav-item" title="Quotes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M7 17h3l2-4V7H6v6h3l-2 4z"/><path d="M16 17h3l2-4V7h-6v6h3l-2 4z"/></svg>
      </button>

      <button class="nav-item" title="Tools">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m7 4 1.5 3L12 8.5 8.5 10 7 13l-1.5-3L2 8.5 5.5 7 7 4z"/><path d="m18 11 1 2 2 1-2 1-1 2-1-2-2-1 2-1 1-2z"/><path d="M14 4h6"/><path d="M17 1v6"/></svg>
      </button>

      <div class="spacer"></div>

      <button class="nav-item" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5z"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 0 1-4 0v-.09A1.7 1.7 0 0 0 8 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 3.6 15 1.7 1.7 0 0 0 3 14a1.7 1.7 0 0 0-1.1-.4H1.8a2 2 0 0 1 0-4h.09A1.7 1.7 0 0 0 3.6 8 1.7 1.7 0 0 0 3.26 6.1l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 8 3.6 1.7 1.7 0 0 0 9 3a1.7 1.7 0 0 0 .4-1.1V1.8a2 2 0 0 1 4 0v.09A1.7 1.7 0 0 0 15 3.6a1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 8c.2.38.6.7 1 .8.3.1.7.1 1.1.1h.1a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.1.4c-.4.2-.7.6-1 .7z"/></svg>
      </button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3v14"/><path d="M8.5 7.5c0-1.8 1.6-3.5 3.5-3.5s3.5 1.7 3.5 3.5c0 1.3-.8 2.4-2 3V20H10.5v-9.5c-1.2-.6-2-1.7-2-3z"/></svg>
          </div>
          <div class="brand-name">Etymos</div>
        </div>

        <div class="top-actions">
          <button class="icon-btn" title="Notifications">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
          </button>
          <div class="lang">GB English <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m6 9 6 6 6-6"/></svg></div>
        </div>
      </header>

      <section class="workspace">
        <div class="grid">
          <section class="panel editor-panel">
            <div class="panel-head">
              <div class="panel-title"><strong>YAML EDITOR</strong><span>Ready</span></div>
              <button class="head-link">Clear</button>
            </div>

            <div class="editor-area">
              <div class="line-number">1</div>
              <div class="editor-input">
                <textarea spellcheck="false" placeholder="Paste your YAML here..."></textarea>
              </div>
            </div>

            <div class="editor-foot">
              <button class="btn btn-secondary btn-disabled" style="min-width:96px">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 21H5a2 2 0 0 1-2-2V7l4-4h12a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8"/><path d="M7 3v4h8"/></svg>
                Save
              </button>
            </div>
          </section>

          <section class="panel table-panel">
            <div class="toolbar">
              <div class="toolbar-row">
                <div class="search-wrap">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
                  <input placeholder="Search..." />
                </div>

                <div class="search-actions">
                  <button class="search-btn">Search</button>
                  <button class="search-btn">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m6 9 6 6 6-6"/></svg>
                  </button>
                </div>
              </div>

              <div class="toolbar-row split">
                <div class="toolbar-left">
                  <div class="ctl">Newest <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m6 9 6 6 6-6"/></svg></div>
                  <div class="ctl">SIZE <strong>20</strong></div>
                  <div class="ctl"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 6 9 17l-5-5"/></svg> Select All Matching</div>
                </div>

                <div class="toolbar-right">
                  <button class="btn btn-soft-green" style="height:28px;padding:0 10px">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><ellipse cx="12" cy="5" rx="7" ry="3"/><path d="M5 5v6c0 1.7 3.1 3 7 3s7-1.3 7-3V5"/><path d="M5 11v6c0 1.7 3.1 3 7 3s7-1.3 7-3v-6"/></svg>
                    Batch Anki Actions
                  </button>
                  <button class="btn btn-soft-blue" style="height:28px;padding:0 10px">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
                    Print Selected (20)
                  </button>
                  <button class="btn btn-quiet" style="height:28px;padding:0 10px">

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Etymos — Final Editorial UI</title>
  <style>
    :root{
      --bg-top:#f7f4ee;
      --bg-bottom:#f1ede6;
      --surface:#fffefa;
      --editor-field:#fcfbf7;
      --table-field:#faf9f5;
      --surface-panel:rgba(255,255,252,.94);
      --surface-soft:#fbf8f2;
      --surface-head:#fffdf8;

      --text:#1f1d1a;
      --text-soft:#3d3934;
      --muted:#6d6860;
      --faint:#9b948a;

      --border:#e6ded3;
      --border-strong:#d6ccbf;
      --line:#eee7dc;

      --nav:#15120f;
      --nav-soft:#1e1a16;

      --green:#247253;
      --green-hover:#1f6549;
      --green-soft:#eef8f2;
      --green-border:#c8e8d8;

      --blue:#245bd8;
      --blue-soft:#eef3ff;
      --blue-border:#cbd9ff;

      --shadow-sm:0 1px 2px rgba(24,18,10,.035);
      --shadow-md:0 8px 26px rgba(24,18,10,.055);

      --sans:Inter,-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;
      --serif:"Iowan Old Style","Palatino Linotype","Book Antiqua",Palatino,Georgia,"Times New Roman",serif;
      --mono:"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    }

    *{box-sizing:border-box}

    html,body{height:100%}

    body{
      margin:0;
      color:var(--text);
      font-family:var(--sans);
      -webkit-font-smoothing:antialiased;
      background:
        radial-gradient(circle at 80% -12%, rgba(255,255,255,.88), transparent 28%),
        linear-gradient(180deg,var(--bg-top) 0%,var(--bg-bottom) 100%);
      overflow:hidden;
    }

    button,input,select,textarea{font:inherit}
    button{cursor:pointer}

    .app{
      height:100vh;
      min-width:1120px;
      display:grid;
      grid-template-columns:58px 1fr;
    }

    .sidebar{
      background:linear-gradient(180deg,#171410 0%,#11100d 100%);
      border-right:1px solid rgba(255,255,255,.055);
      padding:14px 8px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
    }

    .nav-item{
      width:36px;
      height:36px;
      border:0;
      border-radius:9px;
      background:transparent;
      color:#aaa39a;
      display:grid;
      place-items:center;
      transition:background .14s ease,color .14s ease;
    }

    .nav-item:hover{background:rgba(255,255,255,.075);color:#fff}
    .nav-item.active{background:rgba(255,255,255,.085);color:#fff}
    .nav-item svg{width:18px;height:18px;stroke-width:1.85}
    .spacer{flex:1}

    .main{
      min-width:0;
      display:grid;
      grid-template-rows:58px 1fr;
    }

    .topbar{
      height:58px;
      background:rgba(255,255,252,.76);
      backdrop-filter:blur(18px);
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px 0 28px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .brand-icon{
      width:22px;
      height:22px;
      color:var(--blue);
      display:grid;
      place-items:center;
    }

    .brand-name{
      font-family:var(--serif);
      font-size:23px;
      font-weight:700;
      line-height:1;
      letter-spacing:-.04em;
      color:#171513;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .icon-btn{
      width:30px;
      height:30px;
      border-radius:8px;
      border:1px solid var(--border);
      background:var(--surface);
      color:#5e5851;
      display:grid;
      place-items:center;
      box-shadow:var(--shadow-sm);
    }

    .icon-btn:hover{
      background:#fff;
      border-color:var(--border-strong);
    }

    .lang{
      height:30px;
      min-width:104px;
      padding:0 10px;
      border-radius:8px;
      border:1px solid var(--border);
      background:var(--surface);
      color:#55504a;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      font-size:13px;
      box-shadow:var(--shadow-sm);
    }

    .workspace{
      min-width:0;
      min-height:0;
      padding:16px 14px 14px;
      overflow:auto;
      background:transparent;
    }

    .grid{
      min-height:calc(100vh - 88px);
      display:grid;
      grid-template-columns:1fr 1.22fr;
      gap:14px;
    }

    .panel{
      min-height:0;
      overflow:hidden;
      background:var(--surface-panel);
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:var(--shadow-sm);
    }

    .panel-head{
      height:48px;
      padding:0 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg,#fffefa,#fbf8f2);
    }

    .panel-title{
      display:flex;
      align-items:baseline;
      gap:12px;
    }

    .panel-title strong{
      font-size:14px;
      font-weight:740;
      letter-spacing:.055em;
      color:#2f2b26;
      text-transform:uppercase;
    }

    .panel-title span{
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--muted);
      font-size:13px;
      font-weight:500;
    }

    .panel-title span::before{
      content:"";
      width:6px;
      height:6px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 0 3px rgba(36,114,83,.08);
    }

    .head-link{
      border:0;
      background:transparent;
      color:#9d968d;
      font-size:13px;
      padding:0;
    }

    .editor-panel{
      display:grid;
      grid-template-rows:48px 1fr 56px;
    }

    .editor-area{
      min-height:0;
      background:var(--editor-field);
      display:grid;
      grid-template-columns:46px 1fr;
      border-bottom:1px solid var(--line);
      font-family:var(--mono);
      font-size:13px;
      line-height:1.72;
      color:#3b3732;
    }

    .line-number{
      padding-top:20px;
      text-align:center;
      color:#b5ada2;
      border-right:1px solid var(--line);
      user-select:none;
    }

    .editor-input{
      padding:18px 16px;
      background:linear-gradient(180deg,#fcfbf7 0%,#fbfaf6 100%);
    }

    .editor-input textarea{
      width:100%;
      height:100%;
      min-height:520px;
      border:0;
      outline:0;
      resize:none;
      background:transparent;
      color:inherit;
      font:inherit;
      line-height:inherit;
    }

    .editor-input textarea::placeholder{color:#9a9389}

    .editor-foot{
      background:var(--surface);
      display:flex;
      align-items:center;
      justify-content:flex-end;
      padding:0 12px;
    }

    .btn{
      height:34px;
      border-radius:8px;
      border:1px solid transparent;
      padding:0 14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-size:13px;
      font-weight:560;
      white-space:nowrap;
      transition:background .14s ease,border-color .14s ease,color .14s ease,box-shadow .14s ease;
    }

    .btn svg{width:14px;height:14px}

    .btn-primary{
      background:var(--green);
      color:#fff;
      box-shadow:0 6px 14px rgba(36,114,83,.16);
    }

    .btn-primary:hover{background:var(--green-hover)}

    .btn-secondary{
      background:var(--surface);
      border-color:var(--border-strong);
      color:#57524b;
    }

    .btn-secondary:hover{background:#fff}

    .btn-soft-green{
      background:var(--green-soft);
      border-color:var(--green-border);
      color:#1f6a4a;
      font-weight:620;
    }

    .btn-soft-blue{
      background:var(--blue-soft);
      border-color:var(--blue-border);
      color:#2452bb;
      font-weight:620;
    }

    .btn-quiet{
      background:var(--surface);
      border-color:var(--border);
      color:#6e6860;
    }

    .btn-disabled{
      opacity:.48;
      box-shadow:none;
      pointer-events:none;
    }

    .table-panel{
      display:grid;
      grid-template-rows:auto 1fr 48px;
    }

    .toolbar{
      padding:10px 12px 12px;
      background:var(--surface);
      border-bottom:1px solid var(--line);
      display:grid;
      gap:10px;
    }

    .toolbar-row{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .toolbar-row.split{
      justify-content:space-between;
      gap:12px;
    }

    .toolbar-left,
    .toolbar-right{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .search-wrap{
      flex:1;
      min-width:280px;
      height:34px;
      border:1px solid var(--border-strong);
      border-radius:8px;
      background:#fff;
      display:flex;
      align-items:center;
      gap:8px;
      padding:0 10px;
      color:#8f877e;
      box-shadow:0 1px 1px rgba(22,16,10,.018);
    }

    .search-wrap:focus-within{
      border-color:rgba(36,114,83,.52);
      box-shadow:0 0 0 3px rgba(36,114,83,.10);
    }

    .search-wrap input{
      width:100%;
      border:0;
      outline:0;
      background:transparent;
      font-size:13px;
      color:var(--text);
    }

    .search-actions{
      display:flex;
      align-items:center;
    }

    .search-btn{
      height:34px;
      border:0;
      background:var(--green);
      color:#fff;
      font-size:13px;
      font-weight:650;
      padding:0 16px;
      box-shadow:0 6px 14px rgba(36,114,83,.14);
    }

    .search-btn:first-child{border-radius:8px 0 0 8px}
    .search-btn:last-child{
      border-left:1px solid rgba(255,255,255,.22);
      border-radius:0 8px 8px 0;
      padding:0 10px;
    }

    .search-btn:hover{background:var(--green-hover)}

    .ctl{
      height:28px;
      border:1px solid var(--border-strong);
      background:var(--surface);
      border-radius:6px;
      padding:0 10px;
      color:#625c54;
      font-size:12px;
      display:inline-flex;
      align-items:center;
      gap:6px;
      box-shadow:0 1px 1px rgba(22,16,10,.018);
    }

    .ctl strong{font-weight:700;color:#34302b}

    .count{
      height:28px;
      border:1px solid var(--border);
      background:#f7f3ec;
      color:#625c54;
      border-radius:999px;
      padding:0 10px;
      font-size:12px;
      font-weight:650;
      display:inline-flex;
      align-items:center;
    }

    .refresh{
      width:28px;
      height:28px;
      border:0;
      background:transparent;
      color:#7b746b;
      display:grid;
      place-items:center;
    }

    .table-wrap{
      min-height:0;
      overflow:auto;
      background:var(--surface);
      padding:12px;
    }

    .table-shell{
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:12px;
      background:var(--table-field);
    }

    .thead,
    .trow{
      display:grid;
      grid-template-columns:34px 1fr 122px;
      align-items:center;
      padding:0 14px;
      border-bottom:1px solid var(--line);
    }

    .thead{
      min-height:42px;
      background:#f4f1eb;
      color:#756d63;
      font-size:12px;
      font-weight:740;
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    .thead .right{justify-self:end}

    .trow{
      min-height:51px;
      transition:background .12s ease;
    }

    .trow:last-child{border-bottom:0}
    .trow:hover{background:#f6f3ed}

    .check{
      width:15px;
      height:15px;
      border-radius:4px;
      border:1px solid #b7aea3;
      background:#fff;
      color:#fff;
      font-size:10px;
      line-height:1;
      display:grid;
      place-items:center;
      font-weight:700;
    }

    .check.selected{
      background:var(--green);
      border-color:var(--green);
    }

    .lemma-cell{
      font-family:var(--serif);
      font-size:17px;
      font-weight:650;
      letter-spacing:-.025em;
      color:#27231f;
    }

    .row-actions{
      display:flex;
      justify-content:flex-end;
      gap:8px;
      opacity:.56;
      transition:opacity .12s ease;
    }

    .trow:hover .row-actions{opacity:1}

    .action-btn{
      width:31px;
      height:31px;
      border-radius:8px;
      border:1px solid var(--border);
      background:#fdfbf7;
      color:#5c564f;
      display:grid;
      place-items:center;
    }

    .action-btn svg{width:16px;height:16px;stroke-width:1.75}

    .action-btn:hover{
      background:#faf8f5;
      border-color:var(--border-strong);
    }

    .footer{
      height:48px;
      padding:0 14px;
      background:var(--surface);
      border-top:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      color:#746e66;
      font-size:12px;
    }

    .pages{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .page{
      min-width:22px;
      height:22px;
      padding:0 6px;
      border:0;
      border-radius:6px;
      background:transparent;
      color:#69635b;
      font-size:12px;
    }

    .page.active{
      background:var(--green);
      color:#fff;
      font-weight:740;
      box-shadow:0 4px 12px rgba(36,114,83,.16);
    }

    .page.ghost{opacity:.46}

    @media(max-width:1200px){
      body{overflow:auto}
      .app{
        height:auto;
        min-height:100vh;
        min-width:0;
      }
      .grid{grid-template-columns:1fr}
      .workspace{overflow:visible}
      .editor-input textarea{min-height:360px}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Main navigation">
      <button class="nav-item active" title="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg>
      </button>

      <button class="nav-item" title="Words">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6.5 3H20v18H6.5A2.5 2.5 0 0 1 4 18.5v-13A2.5 2.5 0 0 1 6.5 3z"/><path d="M8 7h8"/><path d="M8 11h8"/></svg>
      </button>

      <button class="nav-item" title="Quotes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M7 17h3l2-4V7H6v6h3l-2 4z"/><path d="M16 17h3l2-4V7h-6v6h3l-2 4z"/></svg>
      </button>

      <button class="nav-item" title="Tools">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m7 4 1.5 3L12 8.5 8.5 10 7 13l-1.5-3L2 8.5 5.5 7 7 4z"/><path d="m18 11 1 2 2 1-2 1-1 2-1-2-2-1 2-1 1-2z"/><path d="M14 4h6"/><path d="M17 1v6"/></svg>
      </button>

      <div class="spacer"></div>

      <button class="nav-item" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5z"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 0 1-4 0v-.09A1.7 1.7 0 0 0 8 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 3.6 15 1.7 1.7 0 0 0 3 14a1.7 1.7 0 0 0-1.1-.4H1.8a2 2 0 0 1 0-4h.09A1.7 1.7 0 0 0 3.6 8 1.7 1.7 0 0 0 3.26 6.1l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 8 3.6 1.7 1.7 0 0 0 9 3a1.7 1.7 0 0 0 .4-1.1V1.8a2 2 0 0 1 4 0v.09A1.7 1.7 0 0 0 15 3.6a1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 8c.2.38.6.7 1 .8.3.1.7.1 1.1.1h.1a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.1.4c-.4.2-.7.6-1 .7z"/></svg>
      </button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3v14"/><path d="M8.5 7.5c0-1.8 1.6-3.5 3.5-3.5s3.5 1.7 3.5 3.5c0 1.3-.8 2.4-2 3V20H10.5v-9.5c-1.2-.6-2-1.7-2-3z"/></svg>
          </div>
          <div class="brand-name">Etymos</div>
        </div>

        <div class="top-actions">
          <button class="icon-btn" title="Notifications">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
          </button>
          <div class="lang">GB English <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m6 9 6 6 6-6"/></svg></div>
        </div>
      </header>

      <section class="workspace">
        <div class="grid">
          <section class="panel editor-panel">
            <div class="panel-head">
              <div class="panel-title"><strong>YAML EDITOR</strong><span>Ready</span></div>
              <button class="head-link">Clear</button>
            </div>

            <div class="editor-area">
              <div class="line-number">1</div>
              <div class="editor-input">
                <textarea spellcheck="false" placeholder="Paste your YAML here..."></textarea>
              </div>
            </div>

            <div class="editor-foot">
              <button class="btn btn-secondary btn-disabled" style="min-width:96px">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 21H5a2 2 0 0 1-2-2V7l4-4h12a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8"/><path d="M7 3v4h8"/></svg>
                Save
              </button>
            </div>
          </section>

          <section class="panel table-panel">
            <div class="toolbar">
              <div class="toolbar-row">
                <div class="search-wrap">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
                  <input placeholder="Search..." />
                </div>

                <div class="search-actions">
                  <button class="search-btn">Search</button>
                  <button class="search-btn">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m6 9 6 6 6-6"/></svg>
                  </button>
                </div>
              </div>

              <div class="toolbar-row split">
                <div class="toolbar-left">
                  <div class="ctl">Newest <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m6 9 6 6 6-6"/></svg></div>
                  <div class="ctl">SIZE <strong>20</strong></div>
                  <div class="ctl"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 6 9 17l-5-5"/></svg> Select All Matching</div>
                </div>

                <div class="toolbar-right">
                  <button class="btn btn-soft-green" style="height:28px;padding:0 10px">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><ellipse cx="12" cy="5" rx="7" ry="3"/><path d="M5 5v6c0 1.7 3.1 3 7 3s7-1.3 7-3V5"/><path d="M5 11v6c0 1.7 3.1 3 7 3s7-1.3 7-3v-6"/></svg>
                    Batch Anki Actions
                  </button>
                  <button class="btn btn-soft-blue" style="height:28px;padding:0 10px">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
                    Print Selected (20)
                  </button>
                  <button class="btn btn-quiet" style="height:28px;padding:0 10px">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="8"/></svg>
                    Clear Selection
                  </button>
                  <div class="count">327 words</div>
                  <button class="refresh" title="Refresh">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
                  </button>
                </div>
              </div>
            </div>

            <div class="table-wrap">
              <div class="table-shell">
                <div class="thead">
                  <div class="check"></div>
                  <div>LEMMA</div>
                  <div class="right">
                    <div class="ctl" style="height:26px">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M9 4v16"/><path d="M15 4v16"/><path d="M3 10h18"/></svg>
                      Columns
                    </div>
                  </div>
                </div>

                <div class="trow">

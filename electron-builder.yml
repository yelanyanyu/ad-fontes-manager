appId: com.adfontes.manager
productName: ad-fontes-manager
copyright: Copyright © 2026 yelanyanyu(Github)

publish:
  provider: github
  owner: yelanyanyu
  repo: ad-fontes-manager

directories:
  buildResources: assets
  output: release

npmRebuild: false
buildDependenciesFromSource: false

afterPack: scripts/after-pack.mjs

files:
  - out/**/*
  - "!out/**/*.test.js"
  - "!out/**/*.test.js.map"
  - "!out/**/__tests__/**"
  - "!out/**/tests/**"
  - "!out/**/.env*"
  - "!out/**/config.json"
  - "!out/**/config.json.bak"
  - package.json

asarUnpack:
  - "**/*.node"

win:
  icon: assets/icon.ico
  artifactName: ${productName}-${version}-win-${arch}-setup.${ext}
  target:
    - target: nsis
      arch:
        - x64
  # The custom afterPack hook embeds assets/icon.ico via resedit. Keeping
  # electron-builder's rcedit path disabled avoids the legacy winCodeSign
  # bundle extraction failure on Windows environments without symlink privilege.
  signAndEditExecutable: false
  # TODO(security): enable Windows code-signature verification after a signing
  # certificate is available for release builds.
  verifyUpdateCodeSignature: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  include: assets/installer.nsh
  createDesktopShortcut: always
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  shortcutName: Ad Fontes Manager

mac:
  icon: assets/icon.png
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.education

linux:
  target: []

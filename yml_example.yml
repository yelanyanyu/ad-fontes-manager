yield:
  lemma: reflection
  user_word: reflection
  part_of_speech: noun
  syllabification: re-flec-tion
  contextual_meaning:
    en: Careful thought or consideration after turning the matter over in one's mind.
    zh: 经过反复思考后的领悟或理解
  other_common_meanings:
    - 光线、声音或热能被表面弹回的现象；镜子或水面等映出的影像。
    - 物体或属性的折叠状态，或在编程中指程序在运行时检视自身机制的能力。
    - 一种表达或显现：如'他的沉默是对失望的反映'；或一种评论性质的看法。
  user_context_sentence: After days of quiet reflection, she finally understood what he meant.
etymology:
  root_and_affixes:
    root: "-flect- [to bend]"
    prefix: re- [back, again]
    suffix: "-ion [the result or act of]"
    structure_analysis: re- (向后) + flectere (弯曲) + -io (名词后缀)。合起来就是'向后弯折'，这是所有词义的源头画面。
  visual_imagery_zh: |
    我站在洗手台前，水龙头没拧紧，水流在瓷盆底部聚成一个薄薄的水洼。
    我伸手去关水龙头，低头的一瞬间，天花板的灯管在那一小片水面上弯了一下。
    光线没有穿透水洼，而是被水面兜住，弹了回来。那个弯掉的亮白色长条，就在水面上晃。
    我没急着关水，而是盯着看。
    光线碰到水面，没有穿过去，而是被推了回来。在我眼前，它折了一下。
  historical_origins:
    pie_root: "PIE *plek- (to plait, to fold, to twist) "
    source_word: "Late Latin 'reflexionem' (nominative reflexio), from Latin 'reflectere' "
    history_myth: N/A
  meaning_evolution_zh: |
    最早是光被弹回，也就是物理反射。14世纪晚期这个词指的就是这个动作本身。
    光被弹回之后，我们看见了影像。所以到了16世纪80年代，水里的倒影、镜子里的像都叫reflection。
    这个“弹回”的画面用在了人身上。事情进入脑子，然后你把它“折”回来，再翻一遍。17世纪70年代，这个词开始表示把思绪拉回到过去经历或想法上的动作。这就是沉思。
    你把想过的东西“折”回来再组织一下，说给别人听，就成了评论或看法。这是17世纪40年代的事。
    至于编程里的反射，是把这个“向后看自己”的画面用到了极致——程序运行到一半，回头检查自己身上的零件。
cognate_family:
  cognates:
    - word: flexible
      logic: 词根也是flectere（弯曲）。一个东西能反复弯曲还不折断，就是柔软的、有弹性的。
    - word: deflect
      logic: 前缀de-表示向下或离开。光线或飞来的球原本要走直线，被一巴掌扇开，向下偏离了轨道。
    - word: inflect
      logic: 前缀in-表示向内。说话时让声调向内弯曲，往上挑或往下压，来改变句子的意思或语法功能。
    - word: reflector
      logic: 后缀-or表示做这个动作的东西。车灯后面那个亮闪闪的罩子，专门负责把光弹回来。
  instruction: 请用中文写本板块，选择 3-4 个同源词。逻辑说明要自然，避免模板腔。
application:
  selected_examples:
    - type: Literal / Root Image
      sentence: She caught her reflection in the shop window.
      translation_zh: 她在商店橱窗里看见了自己的倒影。
    - type: Current Context
      sentence: After days of quiet reflection, she finally understood what he meant.
      translation_zh: 经过几天的安静反思，她终于明白了他的意思。
    - type: Abstract / Metaphorical
      sentence: His low test scores were a reflection of how little he had studied.
      translation_zh: 他的低分是学习太少的直接反映。
nuance:
  synonyms:
    - word: consideration
      meaning_zh: 仔细考虑，通常带有权衡利弊、寻找解决方案的意图。
    - word: meditation
      meaning_zh: 沉思，冥想，有持续的、专注的、有时带有精神性意味的思考。
  image_differentiation_zh: |
    Reflection的画面是“折回去”。光打到水面弹回来，或者思想从眼前的事上折回去，翻看旧的经历。重点在“回”和“弯”这个动作上。
    Consideration是把东西放在眼前端详。你会把几个选项摊开，翻来覆去地比较，焦点在眼前这些东西上。
    Meditation是把注意力收拢到一个点上。就像把散开的线头重新卷成一个线团，集中在呼吸、一个念头或一个画面上，而不是从A点“折”回B点。
